; Feather nRF52840 Express — two separate firmware images (pick one with --e)
;
; OLED app:   pio run -e display -t upload
; LED demo:   pio run -e led_demo -t upload
; GPS test:   pio run -e gps_test -t upload
; GPS + OLED: pio run -e display_gps -t upload
; BME test:   pio run -e bme_test -t upload
; Blink test: pio run -e blink_test -t upload
; Monitor:    screen /dev/cu.usbmodem1101 115200

[platformio]
default_envs = display

[common_flags]
build_flags =
    -DUSE_TINYUSB
    -I/Users/andreaguerrero/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
    -I/Users/andreaguerrero/.platformio/packages/framework-arduinoadafruitnrf52/libraries/SPI

[env:display]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
lib_deps =
    olikraus/U8g2
    adafruit/Adafruit TinyUSB Library
monitor_speed = 115200
upload_port = /dev/cu.usbmodem*
build_flags = ${common_flags.build_flags}
build_src_filter = +<display_main.cpp>

[env:led_demo]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
lib_deps =
    adafruit/Adafruit NeoPixel
    adafruit/Adafruit TinyUSB Library
monitor_speed = 115200
upload_port = /dev/cu.usbmodem*
build_flags = ${common_flags.build_flags}
build_src_filter = +<led_main.cpp>

